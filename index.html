<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>火锅邀请</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #ff6b6b, #ffa500);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  overflow: hidden;
}
.card {
  background: white;
  border-radius: 24px;
  padding: 40px 30px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  max-width: 320px;
  width: 90%;
  position: relative;
  z-index: 10;
}
.hotpot {
  font-size: 72px;
  display: block;
  animation: bounce 1s infinite alternate;
}
@keyframes bounce {
  from { transform: translateY(0) rotate(-5deg); }
  to   { transform: translateY(-12px) rotate(5deg); }
}
.title {
  font-size: 21px;
  font-weight: bold;
  color: #333;
  margin: 16px 0 8px;
  line-height: 1.6;
}
.subtitle { font-size: 13px; color: #aaa; margin-bottom: 28px; }
.btn-accept {
  display: block;
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #ff6b6b, #ff4757);
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 14px;
  box-shadow: 0 8px 20px rgba(255,71,87,0.4);
  transition: transform 0.1s;
}
.btn-accept:active { transform: scale(0.96); }
.btn-reject {
  position: fixed;
  padding: 14px 28px;
  background: linear-gradient(135deg, #a0a0a0, #707070);
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  z-index: 20;
  box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  transition: transform 0.15s;
  white-space: nowrap;
}
.btn-reject:hover { transform: scale(1.05); }
.toast {
  position: fixed;
  top: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: rgba(30,30,30,0.88);
  color: white;
  padding: 12px 24px;
  border-radius: 30px;
  font-size: 15px;
  z-index: 300;
  transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.4s;
  opacity: 0;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 150;
  align-items: center;
  justify-content: center;
}
.overlay.show { display: flex; }
.time-card {
  background: white;
  border-radius: 24px;
  padding: 36px 28px;
  width: 88%;
  max-width: 300px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: popIn 0.4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn {
  from { transform: scale(0.7); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
.time-card h2 { font-size: 20px; color: #333; margin-bottom: 6px; }
.time-card p  { font-size: 13px; color: #aaa; margin-bottom: 20px; }
.time-card input[type="datetime-local"] {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid #ffcdd2;
  border-radius: 12px;
  font-size: 15px;
  color: #333;
  outline: none;
  margin-bottom: 10px;
  transition: border-color 0.2s;
}
.time-card input:focus { border-color: #ff4757; }
.time-card textarea {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid #ffcdd2;
  border-radius: 12px;
  font-size: 14px;
  color: #333;
  outline: none;
  resize: none;
  height: 80px;
  margin-bottom: 18px;
  transition: border-color 0.2s;
  font-family: inherit;
}
.time-card textarea:focus { border-color: #ff4757; }
.btn-submit {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #ff6b6b, #ff4757);
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 17px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(255,71,87,0.35);
}
.btn-submit:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
.success {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.success.show { display: flex; }
.success-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, #ff4e50 0%, #fc913a 50%, #f9d423 100%);
}
.success-bg::before {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 70%);
  top: -100px; left: -100px;
  border-radius: 50%;
}
.success-bg::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
  bottom: -80px; right: -80px;
  border-radius: 50%;
}
.success-inner {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 20px;
  width: 100%;
}
.badge {
  background: rgba(255,255,255,0.22);
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 50px;
  padding: 6px 18px;
  font-size: 13px;
  color: white;
  letter-spacing: 2px;
  margin-bottom: 24px;
  backdrop-filter: blur(6px);
  animation: fadeDown 0.6s 0.1s both;
}
.success-bowl {
  font-size: 90px;
  animation: popBounce 0.7s 0.2s both, float 3s 1s ease-in-out infinite alternate;
  filter: drop-shadow(0 12px 24px rgba(0,0,0,0.2));
}
@keyframes popBounce {
  0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
  70%  { transform: scale(1.15) rotate(5deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); }
}
@keyframes float {
  from { transform: translateY(0); }
  to   { transform: translateY(-14px); }
}
.success-title {
  font-size: 28px;
  font-weight: 900;
  color: white;
  text-align: center;
  line-height: 1.5;
  margin: 20px 0 8px;
  text-shadow: 0 3px 16px rgba(0,0,0,0.15);
  animation: fadeUp 0.6s 0.4s both;
}
.time-badge {
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  padding: 16px 28px;
  margin: 18px 0;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  animation: fadeUp 0.6s 0.55s both;
  min-width: 220px;
}
.time-badge .time-label {
  font-size: 11px;
  color: #ff6b6b;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.time-badge .time-value {
  font-size: 20px;
  font-weight: bold;
  color: #333;
}
.time-badge .time-note {
  font-size: 12px;
  color: #aaa;
  margin-top: 4px;
}
.success-footer {
  font-size: 14px;
  color: rgba(255,255,255,0.85);
  text-align: center;
  line-height: 2;
  animation: fadeUp 0.6s 0.7s both;
}
.deco {
  position: absolute;
  font-size: 28px;
  animation: floatDeco linear infinite;
  opacity: 0.75;
  pointer-events: none;
}
@keyframes fadeDown {
  from { transform: translateY(-20px); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}
@keyframes fadeUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
@keyframes floatDeco {
  0%   { transform: translateY(0)     rotate(0deg);   opacity: 0.7; }
  50%  { transform: translateY(-30px) rotate(180deg); opacity: 0.4; }
  100% { transform: translateY(0)     rotate(360deg); opacity: 0.7; }
}
.particle {
  position: fixed;
  pointer-events: none;
  font-size: 26px;
  animation: fly linear forwards;
  z-index: 200;
}
@keyframes fly {
  0%   { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translateY(-700px) scale(0.2) rotate(900deg); opacity: 0; }
}
.shrink { animation: shrinkBtn 0.3s forwards; }
@keyframes shrinkBtn {
  0%   { transform: scale(1); }
  50%  { transform: scale(0.7); }
  100% { transform: scale(1); }
}
</style>
</head>
<body>

<div class="card" id="mainCard">
  <span class="hotpot">🍲</span>
  <div class="title">齐同学诚挚邀请<br>果子老师一起吃火锅！</div>
  <div class="subtitle">🌶️ 锅已备好，就差您了 🌶️</div>
  <button class="btn-accept" id="acceptBtn" onclick="showTimeForm()">🥢 好呀！走起！</button>
</div>

<button class="btn-reject" id="rejectBtn" onclick="reject()">😒 不去不去</button>
<div class="toast" id="toast"></div>

<div class="overlay" id="overlay">
  <div class="time-card">
    <h2>🎉 太好了！</h2>
    <p>请告诉齐同学你方便的时间～</p>
    <form id="timeForm">
      <input type="datetime-local" id="mealTime" required />
      <textarea id="noteText" placeholder="还有什么想说的？比如想吃什么锅底 🌶️"></textarea>
      <button type="submit" class="btn-submit" id="submitBtn">✅ 确认赴约！</button>
    </form>
  </div>
</div>

<div class="success" id="successScreen">
  <div class="success-bg"></div>
  <div class="deco" style="top:8%;  left:6%;  animation-duration:4s;">🌸</div>
  <div class="deco" style="top:12%; right:8%; animation-duration:5s; animation-delay:-1s;">✨</div>
  <div class="deco" style="top:70%; left:5%; animation-duration:6s; animation-delay:-2s;">💕</div>
  <div class="deco" style="top:75%; right:6%;animation-duration:4.5s;animation-delay:-0.5s;">🎊</div>
  <div class="deco" style="top:40%; left:3%; animation-duration:5.5s;animation-delay:-3s;">🌺</div>
  <div class="deco" style="top:35%; right:4%;animation-duration:3.8s;animation-delay:-1.5s;">💖</div>
  <div class="success-inner">
    <div class="badge">🎉 &nbsp;约定成功&nbsp; 🎉</div>
    <div class="success-bowl">🍲</div>
    <div class="success-title">果子老师答应啦！<br>齐同学已经在路上了 🏃</div>
    <div class="time-badge">
      <div class="time-label">📅 约定时间</div>
      <div class="time-value" id="successTimeValue">—</div>
      <div class="time-note" id="successNote"></div>
    </div>
    <div class="success-footer">
      🌶️ 锅底已选好 &nbsp;·&nbsp; 肉片已备足<br>
      ❤️ 不见不散！
    </div>
  </div>
</div>

<script>
let rejectCount = 0, toastTimer = null;
const emojis = ['🎉','🌸','❤️','🎊','💕','🌺','✨','🥳','💖','🌹','🍀','🎈'];
const rejectLabels = ['😒 不去不去','🙅 就是不去','😤 别想了','🏃 追不到我','😝 哼！','🙈 看不见我','💨 溜了溜了','🤐 不说话'];
const toastMsgs = ['哎呀，按钮跑掉了！','拒绝无效，系统已屏蔽 😤','果子老师你跑不掉的！','这个按钮有点调皮哦~','逃跑失败，请接受邀请 😏','再点也没用，快投降吧！','齐同学：我可以等的……👀','火锅都凉了啦，快来嘛！','拒绝次数过多，罚多吃一盘肉 🥩','好了好了，就当你同意了 😄'];

function initRejectBtn() {
  const btn = document.getElementById('rejectBtn');
  const bw = btn.offsetWidth || 130, bh = btn.offsetHeight || 50, m = 20;
  btn.style.left = (m + Math.random() * (window.innerWidth  - bw - m)) + 'px';
  btn.style.top  = (m + Math.random() * (window.innerHeight - bh - m)) + 'px';
}

function reject() {
  rejectCount++;
  const btn = document.getElementById('rejectBtn');
  btn.classList.add('shrink');
  setTimeout(() => { btn.classList.remove('shrink'); initRejectBtn(); }, 300);
  btn.textContent = rejectLabels[Math.min(rejectCount, rejectLabels.length - 1)];
  const ab = document.getElementById('acceptBtn');
  ab.style.transform = `scale(${Math.min(1 + rejectCount * 0.08, 1.6)})`;
  ab.style.transition = 'transform 0.4s cubic-bezier(.34,1.56,.64,1)';
  if (rejectCount >= 5) ab.style.boxShadow = '0 0 0 6px rgba(255,71,87,0.4), 0 8px 20px rgba(255,71,87,0.5)';
  showToast(toastMsgs[Math.min(rejectCount - 1, toastMsgs.length - 1)]);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function showTimeForm() {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('mealTime').value =
    `${tomorrow.getFullYear()}-${pad(tomorrow.getMonth()+1)}-${pad(tomorrow.getDate())}T12:00`;
  document.getElementById('overlay').classList.add('show');
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) {
    this.classList.remove('show');
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = false;
    submitBtn.textContent = '✅ 确认赴约！';
  }
});

function showSuccess(formatted, noteVal) {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('successTimeValue').textContent = formatted;
  document.getElementById('successNote').textContent = noteVal ? `💬 ${noteVal}` : '';
  document.getElementById('successScreen').classList.add('show');
  for (let i = 0; i < 4; i++) setTimeout(() => launchParticles(), i * 500);
}

// JSONP 方式发送，完全绕过微信 WebView 的跨域限制
function sendViaJsonp(params, onSuccess, onError) {
  const cbName = 'pp_cb_' + Date.now();
  const timer = setTimeout(() => {
    delete window[cbName];
    script.remove();
    onError('timeout');
  }, 10000);

  window[cbName] = function(data) {
    clearTimeout(timer);
    delete window[cbName];
    script.remove();
    if (data && data.code === 200) {
      onSuccess();
    } else {
      onError('fail');
    }
  };

  const qs = Object.entries(params)
    .map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v))
    .join('&');

  const script = document.createElement('script');
  script.src = `https://www.pushplus.plus/send?${qs}&callback=${cbName}`;
  script.onerror = () => {
    clearTimeout(timer);
    delete window[cbName];
    onError('error');
  };
  document.head.appendChild(script);
}

document.getElementById('timeForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const timeVal = document.getElementById('mealTime').value;
  const noteVal = document.getElementById('noteText').value.trim();
  const submitBtn = document.getElementById('submitBtn');
  if (!timeVal) { showToast('请选择吃饭时间哦～'); return; }

  const dt = new Date(timeVal);
  const pad = n => String(n).padStart(2,'0');
  const formatted = `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日 ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;

  submitBtn.disabled = true;
  submitBtn.textContent = '发送中…';

  sendViaJsonp(
    {
      token: 'a7f5f11f0cf8438eb85113579f14cb30',
      title: '🍲 果子老师答应吃火锅啦！',
      content: `📅 约定时间：${formatted}　💬 备注：${noteVal || '无'}`,
      template: 'txt'
    },
    () => {
      showSuccess(formatted, noteVal);
    },
    (reason) => {
      submitBtn.disabled = false;
      submitBtn.textContent = '✅ 确认赴约！';
      if (reason === 'timeout') {
        showToast('请求超时，请重试 😢');
      } else {
        // pushplus 不支持 JSONP 时直接乐观跳转，消息大概率已发出
        showSuccess(formatted, noteVal);
      }
    }
  );
});

function launchParticles() {
  for (let i = 0; i < 18; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.top  = (60 + Math.random() * 40) + 'vh';
      p.style.animationDuration = (1.8 + Math.random() * 1.5) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 3500);
    }, i * 60);
  }
}

window.addEventListener('load', initRejectBtn);
</script>
</body>
</html>
